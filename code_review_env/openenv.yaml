name: code-review-env
version: "1.0.0"
description: >
  A real-world code review environment where an AI agent learns to identify
  bugs, security vulnerabilities, performance issues, and style problems in
  pull request diffs. Models the actual task senior engineers perform daily.
author: openenv-submission
tags:
  - openenv
  - code-review
  - security
  - static-analysis
  - nlp

tasks:
  - id: task_easy
    name: "Issue Classification"
    description: "Classify the issue type in isolated code snippets"
    difficulty: easy
    max_steps: 20
    reward_range: [0.0, 1.0]

  - id: task_medium
    name: "Severity & Localization"
    description: "Classify issue type + assign severity + identify exact line number"
    difficulty: medium
    max_steps: 30
    reward_range: [0.0, 1.0]

  - id: task_hard
    name: "Full Code Review"
    description: >
      Classify issue, assign severity, pinpoint line number, and write
      an actionable review comment explaining the problem and fix.
    difficulty: hard
    max_steps: 50
    reward_range: [0.0, 1.0]

observation_space:
  type: object
  fields:
    snippet_id: string
    language: string
    file_path: string
    diff: string
    description: string
    queue_size: integer
    current_step: integer
    task_id: string
    snippets_reviewed: integer
    score_so_far: float
    done: boolean
    reward: float
    metadata: object

action_space:
  type: object
  fields:
    issue_type:
      type: string
      enum: [sql_injection, xss, security, bug, performance, style, no_issue]
    severity:
      type: string
      enum: [info, warning, error, critical]
    line_number:
      type: integer
      description: "Line number where the issue occurs (0 for no_issue)"
    review_comment:
      type: string
      description: "Written review comment (required for task_hard)"
    action_type:
      type: string
      enum: [classify, classify_and_localize, full_review]

server:
  port: 7860
  framework: fastapi

docker:
  base_image: python:3.11-slim
  port: 7860